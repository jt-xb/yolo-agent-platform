# docker-compose.offline.yml
# 离线部署编排文件（ARM aarch64）
# 用法: docker compose -f docker-compose.offline.yml up -d

version: '3.8'

services:
  # ===== 前端 =====
  frontend:
    image: yolo-agent-frontend:offline
    container_name: yolo-agent-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - yolo-network
    restart: unless-stopped
    depends_on:
      - backend

  # ===== 后端 API =====
  backend:
    image: yolo-agent-backend:offline
    container_name: yolo-agent-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../data:/app/data              # 数据目录（包含数据集、模型）
      - ./config/.env.offline:/app/backend/.env  # 环境配置
    environment:
      - DATA_DIR=/app/data
      - LLM_API_KEY=${LLM_API_KEY:-}
      - USE_MLU=${USE_MLU:-false}
    networks:
      - yolo-network
    restart: unless-stopped
    # MLU370 可选启用（需要 ARM 版寒武纪驱动）
    # devices:
    #   - /dev/cambricon:/dev/cambricon

  # ===== Label Studio（可选）=====
  label-studio:
    image: heartexg/label-studio:1.7.2
    container_name: yolo-agent-label-studio
    ports:
      - "${LABEL_STUDIO_PORT:-8080}:8080"
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILESYSTEM_MOUNT=/label-studio/data
    volumes:
      - ../data/label-studio:/label-studio/data
    networks:
      - yolo-network
    restart: unless-stopped

networks:
  yolo-network:
    driver: bridge
