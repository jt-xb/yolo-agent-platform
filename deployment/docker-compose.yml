# MySQL 容器配置（如需创建新的MySQL容器）
# 如果使用已有MySQL容器，参考 .env.example 配置连接信息

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: yolo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: yolo_platform
      MYSQL_DATABASE: yolo_platform
      MYSQL_USER: yolo
      MYSQL_PASSWORD: yolo_platform
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 如需初始化脚本，放置在 ./mysql-init/ 目录
      # - ./mysql-init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local

# 使用已有MySQL容器时，不需要启动此文件中的mysql服务
# 只需配置 backend/.env 中的 DATABASE_URL 指向你的MySQL容器
