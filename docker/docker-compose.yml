version: '3.8'

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: yolo-agent-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - yolo-network
    restart: unless-stopped
    environment:
      - VITE_API_BASE=http://localhost:${BACKEND_PORT:-8000}

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: yolo-agent-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../data:/app/data
      - ./.env:/app/backend/.env
    environment:
      - DATABASE_URL=sqlite:///./yolo_agent.db
      - DATA_DIR=/app/data
    networks:
      - yolo-network
    restart: unless-stopped
    depends_on:
      - train

  train:
    build:
      context: ..
      dockerfile: docker/train.Dockerfile
    container_name: yolo-agent-train
    ports:
      - "${TRAIN_PORT:-8001}:8001"
    volumes:
      - ../data:/app/data
      - ./.env:/app/backend/.env
    environment:
      - DATABASE_URL=sqlite:///./yolo_agent.db
      - DATA_DIR=/app/data
      - CUDA_VISIBLE_DEVICES=0
    networks:
      - yolo-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  label-studio:
    image: heartexg/label-studio:latest
    container_name: yolo-agent-label-studio
    ports:
      - "${LABEL_STUDIO_PORT:-8080}:8080"
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILESYSTEM_MOUNT=/label-studio/data
    volumes:
      - ../data/label-studio:/label-studio/data
    networks:
      - yolo-network
    restart: unless-stopped

networks:
  yolo-network:
    driver: bridge
